name: RFC proposal (do not file as an issue)
description: Use the rfcs/ directory and open a PR instead
labels: ["rfc"]
body:
  - type: markdown
    attributes:
      value: |
        RFCs are not filed as GitHub issues. Instead:

        1. Copy `rfcs/0000-template.md` to `rfcs/NNNN-your-name.md` (pick the next free number).
        2. Fill out the template — at minimum: Summary, Motivation, Detailed design, Drawbacks, Alternatives.
        3. Open a PR titled `RFC: <short name>` and tag it with the `rfc` label.
        4. Wait at least 5 business days for community input and at least one maintainer approval before merge.

        See `rfcs/README.md` for the full lifecycle.

        If you came here looking to discuss an idea informally first, please use GitHub Discussions (if enabled) or open a feature request issue.
  - type: checkboxes
    id: confirm
    attributes:
      label: I understand
      options:
        - label: I will open a PR under `rfcs/` instead of submitting this as an issue.
          required: true
