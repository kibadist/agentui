name: Feature request
description: Suggest a new feature, hook, component, or behavior
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for small, well-scoped feature requests. For changes that touch the wire protocol, public hook signatures, or add a new top-level package, open an RFC instead — see `rfcs/README.md`.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is the use case or pain point this feature would address?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A clear, concrete description of the API or behavior you want. Code examples welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds exist today? Why are they insufficient?
  - type: textarea
    id: additional
    attributes:
      label: Additional context
